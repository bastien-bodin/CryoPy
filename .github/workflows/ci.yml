name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/pysph-env:latest

jobs:

  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.IMAGE }}
          cache-to: type=inline

  test:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lancer pysph test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/framework:/framework \
            ${{ env.IMAGE }} \
            pysph test -v -- -k "not mayavi and not tvtk"

  tag:
    runs-on: ubuntu-22.04
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Créer un tag de version automatique
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v0.1.0"
          else
            NEW_TAG=$(echo $LAST_TAG | awk -F. '{$NF=$NF+1; print}' OFS=.)
          fi
          git tag $NEW_TAG
          git push origin $NEW_TAG